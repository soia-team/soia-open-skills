schema_version: 1
kind: feishu_permission_catalog

# Machine-readable source of truth for permission reminders.
# Keep customer-specific App IDs, approval states, and granted scopes outside
# the public skill.
auth:
  default:
    token_type: tenant_access_token
    identity: bot
    scope_type: tenant
    user_oauth_default: false
  app_permission_url: "https://open.feishu.cn/app/<APP_ID>/auth"
  identity_modes:
    application:
      label: 应用身份权限
      token_type: tenant_access_token
      runtime_identity: bot
      console_tab: 应用身份权限
      setup: 使用 App ID + App Secret 配置 lark-cli profile
      resource_boundary: 应用可见范围、应用数据权限和资源级授权
    user_oauth:
      label: 用户身份权限
      token_type: user_access_token
      runtime_identity: user
      console_tab: 用户身份权限
      setup: 在开放平台开通用户权限后运行 lark-cli auth login 并由用户授权
      resource_boundary: 当前登录用户本人可读写的资源范围
  dual_identity_rule: 同一 scope 若需要同时支持 bot 和 user，必须在应用身份权限、用户身份权限两个页签分别申请；只使用一种身份时不要重复申请。

lifecycle:
  steps:
    - open_app_permission_page
    - select_minimum_scopes
    - configure_app_data_permissions
    - publish_app_version
    - wait_for_admin_approval_when_required
    - verify_auth_status
    - run_representative_readonly_command
  status_rules:
    draft_saved: not_effective
    reviewing: not_effective
    approved_and_published: effective_for_allowed_resources

scenarios:
  knowledge_base_readonly:
    title: 知识库 / Wiki 只读盘点
    intent: 列出知识空间和节点，读取 Wiki 文档正文并做迁移评估
    risk: low
    identity_modes:
      application:
        token_type: tenant_access_token
        runtime_identity: bot
        console_tab: 应用身份权限
        required_scopes:
          - scope: "wiki:wiki:readonly"
            purpose: 读取知识库相关资源
          - scope: "wiki:space:read"
            purpose: 读取知识空间
          - scope: "wiki:space:retrieve"
            purpose: 获取知识空间详情
          - scope: "wiki:node:read"
            purpose: 读取知识库节点
          - scope: "wiki:node:retrieve"
            purpose: 获取节点详情
          - scope: "docs:doc:readonly"
            purpose: 只读访问文档
          - scope: "docx:document:readonly"
            purpose: 只读访问新版文档
          - scope: "docs:document.content:read"
            purpose: 读取文档正文内容
        resource_authorization: 知识库管理员还需要把应用加入目标知识空间或节点的可访问成员/管理员范围
      user_oauth:
        token_type: user_access_token
        runtime_identity: user
        console_tab: 用户身份权限
        required_scopes:
          - scope: "wiki:wiki:readonly"
            purpose: 以当前用户身份读取知识库相关资源
          - scope: "wiki:space:read"
            purpose: 读取用户可见的知识空间
          - scope: "wiki:space:retrieve"
            purpose: 获取知识空间详情
          - scope: "wiki:node:read"
            purpose: 读取用户可见的知识库节点
          - scope: "wiki:node:retrieve"
            purpose: 获取节点详情
          - scope: "docs:doc:readonly"
            purpose: 只读访问用户可见的文档
          - scope: "docx:document:readonly"
            purpose: 只读访问用户可见的新版文档
          - scope: "docs:document.content:read"
            purpose: 读取文档正文内容
        authorization_command: lark-cli auth login --scope "<the minimal user scopes>"
    verification_commands:
      - "wiki +space-list --as bot --page-all --format json"
      - "wiki +node-list --as bot --space-id <SPACE_ID> --page-all --format json"
      - "docs +fetch --as bot --doc <URL_OR_TOKEN> --scope outline --doc-format markdown --format json"
      - "docs +fetch --as bot --doc <URL_OR_TOKEN> --scope full --doc-format markdown --format json"
      - "wiki +space-list --as user --page-all --format json"
      - "wiki +node-list --as user --space-id <SPACE_ID> --page-all --format json"
    resource_boundary:
      - 开通 scope 不等于应用自动看见所有知识库资源
      - 知识库管理员可能还需要授权应用访问知识空间或节点
      - bot 不代表用户读取个人知识库；个人库 my_library 只走 user 身份

  drive_readonly:
    title: 云盘搜索和文件只读盘点
    intent: 搜索云盘文件并盘点文档、文件夹和类型
    risk: medium
    identity_modes:
      application:
        token_type: tenant_access_token
        runtime_identity: bot
        console_tab: 应用身份权限
        required_scopes:
          - scope: "drive:drive.search:readonly"
            purpose: 只读搜索应用可见的云盘资源
          - scope: "drive:drive:readonly"
            purpose: 只读访问应用可见的云盘资源
        conditional_scopes:
          - scope: "drive:drive"
            purpose: 部分版本的元数据检查可能要求此 scope
            only_when: CLI 错误明确返回 missing_scopes
          - scope: "drive:drive.metadata:readonly"
            purpose: 只读获取文件元数据
            only_when: CLI 错误明确返回 missing_scopes
        resource_authorization: 文件夹或文档所有者还需要把应用加入目标资源；tenant scope 不会自动打开个人云盘
      user_oauth:
        token_type: user_access_token
        runtime_identity: user
        console_tab: 用户身份权限
        required_scopes:
          - scope: "drive:drive.search:readonly"
            purpose: 只读搜索当前用户可见的云盘资源
          - scope: "drive:drive:readonly"
            purpose: 只读访问当前用户可见的云盘资源
          - scope: "drive:drive.metadata:readonly"
            purpose: 读取个人云盘根目录、文件夹和文件元数据
        authorization_command: lark-cli auth login --scope "drive:drive.search:readonly drive:drive:readonly drive:drive.metadata:readonly"
    verification_commands:
      - "drive +search --as bot --query '' --doc-types doc,docx,sheet,bitable,file,folder,wiki,slides --format json"
      - "drive +search --as user --query '' --doc-types doc,docx,sheet,bitable,file,folder,wiki,slides --format json"
      - "drive +inspect --as bot --url <URL> --format json"
      - "drive +inspect --as user --url <URL> --format json"
    resource_boundary:
      - 不要把搜索结果为空解释为用户云盘为空
      - bot 的可见范围受应用授权、资源授权和租户策略共同限制
      - user 身份的可见范围取决于当前用户本人权限；它不是 bot 的资源授权替代品

  comments_and_permissions_readonly:
    title: 评论和权限元数据只读
    intent: 仅在客户明确要求时读取评论、成员或访问设置
    risk: sensitive_metadata
    optional_scopes:
      - scope: "docs:document.comment:read"
        purpose: 读取文档评论
      - scope: "docs:permission.member:readonly"
        purpose: 只读查看文档成员
      - scope: "docs:permission.member:retrieve"
        purpose: 获取文档成员详情
      - scope: "docs:permission.setting:read"
        purpose: 读取文档权限设置
      - scope: "docs:permission.setting:readonly"
        purpose: 只读读取权限配置
    verification_commands:
      - "drive +list-comments --as bot --url <URL> --format json"
    output_policy:
      - 只展示必要字段
      - 不输出 token、Secret 或完整个人信息

  attachments_export:
    title: 附件、导出和下载
    intent: 客户明确要求读取图片、下载附件或导出文件时使用
    risk: sensitive_data
    optional_scopes:
      - scope: "docs:document.media:download"
        purpose: 下载文档媒体资源
      - scope: "drive:file:download"
        purpose: 下载云盘文件
      - scope: "drive:export:readonly"
        purpose: 只读导出文件
    approval_note: 即使不修改远端，也可能带走敏感数据；必须确认对象和输出位置

  sheets_and_base_readonly:
    title: 表格和多维表只读
    intent: 客户明确要求盘点或读取 Sheets / Base 时使用
    risk: medium
    optional_scopes:
      - scope: "sheets:spreadsheet:readonly"
        purpose: 只读访问电子表格
      - scope: "sheets:spreadsheet.meta:read"
        purpose: 读取表格元数据
      - scope: "base:record:read"
        purpose: 读取多维表记录
      - scope: "base:record:retrieve"
        purpose: 获取多维表记录详情
    exclusion: Wiki 或云盘调研不应默认申请 Sheets / Base 权限

  events:
    title: 实时事件和订阅
    intent: 客户明确要求持续监听文档变化、删除或打开事件时使用
    risk: event_subscription
    optional_scopes:
      - scope: "docs:event.document_deleted:read"
        purpose: 读取文档删除事件
      - scope: "docs:event.document_edited:read"
        purpose: 读取文档编辑事件
      - scope: "docs:event.document_opened:read"
        purpose: 读取文档打开事件
      - scope: "docs:event:subscribe"
        purpose: 订阅文档事件
    extra_requirements:
      - 事件订阅配置
      - 回调地址
      - 应用发布配置

policy:
  default_mode: read_only
  user_oauth_scope_is_not_bot_scope: true
  never_default_scopes:
    - "docs:doc"
    - "docs:document.comment:create"
    - "docs:document.comment:update"
    - "docs:document.comment:delete"
    - "docs:document.comment:write_only"
    - "docs:document.media:upload"
    - "docs:document:copy"
    - "docs:document:import"
    - "docx:document:create"
    - "docx:document:write_only"
    - "drive:file:upload"
    - "wiki:node:create"
    - "wiki:node:update"
    - "wiki:node:move"
    - "wiki:node:copy"
    - "wiki:setting:write_only"
    - "wiki:space:write_only"
    - "space:document:move"
    - "space:document:delete"
    - "base:record:create"
    - "base:record:update"
    - "base:record:delete"
    - "sheets:spreadsheet:create"
    - "sheets:spreadsheet:write_only"
  conditional_sensitive_scopes:
    - "docs:document:export"
    - "docs:document.media:download"
    - "drive:file:download"

fallback_rules:
  scope_name_source: 当前飞书开放平台和 CLI 返回的 missing_scopes
  on_missing_scopes:
    - 使用 CLI 错误中的 console_url
    - 只补申请明确缺失的最小 scope
    - 保存权限配置并发布应用版本
    - 重新运行 auth status 和代表性只读命令
  on_invisible_resource:
    - 不要静默切换到 user OAuth
    - 让资源所有者或知识库管理员授权应用
    - 在回执中单列 bot 不可见范围
