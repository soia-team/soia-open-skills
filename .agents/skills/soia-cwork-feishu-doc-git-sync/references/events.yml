version: 1

purpose: "把飞书文档变更事件转换成按 node_token/obj_token 的增量同步目标"

official_event_candidates:
  - name: drive.file.edit_v1
    meaning: "云文档正文编辑成功"
    action: refetch_document_by_obj_token
  - name: drive.file.title_updated_v1
    meaning: "云文档标题变更"
    action: refetch_document_and_reconcile_tree
  - name: drive.file.created_in_folder_v1
    meaning: "文件夹内创建文件"
    action: full_tree_reconcile
  - name: drive.file.trashed_v1
    meaning: "文件移入回收站"
    action: full_tree_reconcile_and_mark_deleted
  - name: drive.file.deleted_v1
    meaning: "文件彻底删除"
    action: full_tree_reconcile_and_mark_deleted

subscription:
  recommended_version: v2
  preferred_transport: long_connection
  fallback_transport: webhook
  publish_required: true
  tenant_access_token_visibility: "仅能收到应用拥有或应用管理员范围内的文档事件"
  user_access_token_visibility: "按用户可见范围接收，不能替代 bot 应用凭证模式"
  likely_scope_for_document_events:
    - space:document.event:read

wiki_boundary:
  dedicated_wiki_move_event_in_official_event_list: false
  reconciliation_required: true
  reason: "Wiki 节点的父子层级仍以 node-list/parent_node_token 为准，事件只作为变更提示"

cli_boundary:
  lark_cli_event_keys_currently_exposed:
    - "由 lark-cli event list --json 动态查询"
  drive_file_events_directly_consumable_by_lark_cli: false
  adapter: "外部官方长连接或 webhook 写入 NDJSON，再通过 --event-file 触发同步"

event_file_contract:
  accepted: "JSON array, one JSON object, or NDJSON"
  recognized_ids:
    - node_token
    - wiki_token
    - wiki_node_token
    - obj_token
    - file_token
    - document_token
  recognized_event_name_fields:
    - event_type
    - type
    - event_name
  command: "python3 scripts/sync_feishu_wiki.py --config <config.yml> --event-file <events.ndjson>"
