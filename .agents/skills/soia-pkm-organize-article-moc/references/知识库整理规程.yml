# 知识库整理操作规程 — 外部配置（prompt-as-config）
#
# 用途：任何「整理 / 重组我知识库某一块」的任务，开工前加载本文件，严格按三阶段执行。
# 设计：规程与 skill 解耦——SKILL.md 只引用本文件，不写死条文；改规程改这里，不动 skill 代码。
# 来源：2026-07-07 一次「上来就造山寨结构、没先摸清用户已有体系」的返工复盘沉淀。

name: 知识库整理操作规程
version: 1
一句话: 先当侦探（摸清你已有什么），再当参谋（提最小方案给用户拍板），最后才当施工队（确认后再批量）。

阶段:
  - 名称: 一 · 探明现状
    约束: 只读；禁止建目录、写文件、生成任何数据
    步骤:
      - 先答用途：这批内容整理完，拿来回答用户哪个具体问题？答不出用途的整理不要做。
      - 读遍约定：根 AGENTS.md + 相关分区 AGENTS.md + 任何「放置规则/命名规则/维护规则」文档 + 相关 .base 结构；命名、目录序号、frontmatter、主标签、链接规范逐条记下。
      - 搜同类（最关键）：用 grep/find 找库里是否已有同主题的目录/索引/模板/清单。已有结构就默认扩展它，绝不另起一套；一旦发现疑似重复，停下来问用户「你已经有 X 了，并进去还是要新的」，不要自己决定新建。
      - 模板从真实样本来：同类笔记/文档现在怎么写的？抽 2-3 篇提炼章节结构、字段、分类口径当模板——不许凭空发明模板或分类。

  - 名称: 二 · 先提方案（不要先干）
    约束: 未经用户确认，不许批量生成
    步骤:
      - 一页方案：放哪（引放置规则）/ 复用哪个现有结构或模板 / 最小可行结构 / 每一层（目录·分类·字段·索引）分别解决什么真实查询——说不出用途的层一律砍掉。
      - 分类从样本归纳，越少越好；拿不准的分类留给用户手填，不许自动瞎猜。
      - 只做一个样本给用户看（一张卡 / 一篇 / 一个目录），确认口径后再批量。绝不一次性生成几十个再让用户发现方向错了。

  - 名称: 三 · 最小执行 + 自查
    步骤:
      - 按确认的口径执行；能复用脚本的复用，脚本归 skill、不散落在知识库里；代码/大文件放对位置（如 upstream 代码进 v8、不进 vault）。
      - 交付前自查：与现有结构是否重复？是否制造死链？是否违反放置/命名/维护规则？每篇是否有实际内容而不是空骨架？

红线:  # 这几条都是真实返工的根因
  - 不先探明现有体系就动手 = 必返工。
  - 库里已有成熟结构还另起一套 = 重复造轮子。
  - 空模板 / 自动瞎猜分类 / 内容跨层重复 = 没用的仪式。
  - 一次性批量生成再让用户挑错 = 浪费。
