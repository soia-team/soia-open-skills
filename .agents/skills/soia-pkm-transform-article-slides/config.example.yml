# soia-pkm-transform private config example.
# Copy to ~/.config/soia-skills/soia-open-skills/soia-pkm/soia-pkm-transform/config.yml.
# NotebookLM home is provider-owned auth state; keep it private and out of git.

env:
  OBSIDIAN_VAULT: "<vault-path>"
  NOTEBOOKLM_HOME: "~/.config/soia-skills/soia-open-skills/soia-pkm/soia-pkm-transform/notebooklm"
  NOTEBOOKLM_PROFILE: "default"
  NOTEBOOKLM_HL: "zh_Hans"
  SOIA_PKM_TRANSFORM_CONFIG: "~/.config/soia-skills/soia-open-skills/soia-pkm/soia-pkm-transform/transform.config.yml"
  OPEN_DESIGN_HOME: "<optional-open-design-home>"
