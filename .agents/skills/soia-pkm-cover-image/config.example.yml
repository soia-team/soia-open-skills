# soia-pkm-cover-image 私有偏好配置样例。
# 复制到 ~/.config/soia-skills/soia-open-skills/soia-pkm/soia-pkm-cover-image/config.yml
# 或用 SOIA_PKM_COVER_IMAGE_CONFIG_FILE 指向自定义路径。
#
# 本技能不需要任何账号凭据、cookie 或 token——这份文件只保存生成偏好，
# 不要在里面写入秘密值。

version: 1

env:
  # 可选：覆盖未指定用户输出路径时的“草稿文章同目录”默认值。
  # 请使用绝对路径，不要指向 vault 根 outputs/。
  COVER_IMAGE_OUTPUT_DIR: "<optional-absolute-output-directory>"

defaults:
  preferred_type: auto        # hero | conceptual | typography | metaphor | scene | minimal | auto
  preferred_palette: auto     # warm | elegant | cool | dark | vivid | mono | auto
  preferred_rendering: auto   # flat-vector | hand-drawn | painterly | digital | auto
  default_aspect: "2.35:1"    # 2.35:1（默认，微信公众号头图 900x383）| 16:9 | 1:1（小红书）
  quick_mode: false           # true 时视为客户已同意跳过"确认闸门"，直接用推荐参数生成

backend:
  preferred: auto             # auto（探测 codex CLI）| codex-exec（显式指定）
