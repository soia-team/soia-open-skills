name: Audit Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install audit dependencies
        run: python3 -m pip install -r requirements-dev.txt
      - name: Run tooling unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'
      - name: Run WeChat archive regression tests
        run: python3 -m unittest discover -s skills/soia-pkm-clip-wechat/tests -p 'test_*.py'
      - name: Run AI CLI upgrade regression tests
        run: bash skills/soia-dev-ai-cli-upgrade/tests/test_upgrade_ai_clis.sh
      - name: Audit skills
        run: python3 scripts/audit_skills.py --strict
      - name: Check skill catalog freshness
        run: python3 scripts/generate_skill_catalog.py --check
