name: Audit Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
      - name: Install audit dependencies
        run: python3 -m pip install -r requirements-dev.txt
      - name: Run tooling unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'
      - name: Audit skills
        run: python3 scripts/audit_skills.py --strict
      - name: Check skill catalog freshness
        run: python3 scripts/generate_skill_catalog.py --check
      - name: Check top-level README skill coverage
        run: python3 scripts/check_readme_coverage.py
      - name: Check marketplace manifest freshness
        run: python3 scripts/generate_marketplaces.py --check
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Check router index freshness
        run: python3 scripts/generate_router_index.py --check
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Validate portal Codex plugin manifest
        run: |
          curl --fail --location --silent --show-error \
            https://raw.githubusercontent.com/openai/codex/4462b9deef211723b781b426f5e5d36a5777115f/codex-rs/skills/src/assets/samples/plugin-creator/scripts/validate_plugin.py \
            --output "$RUNNER_TEMP/validate_plugin.py"
          python3 "$RUNNER_TEMP/validate_plugin.py" .
