# Copy to:
# ~/.config/soia-skills/soia-open-skills/cwork/soia-cwork-feishu-doc-git-sync/config.yml
# Never commit real credentials, tenant URLs, private paths, or tokens.

version: 1

provider:
  cli: lark-cli
  profile: "<configured-cli-profile>"
  brand: feishu
  identity: bot

space:
  id: "<wiki-space-id>"
  source_url_template: "https://<tenant>.feishu.cn/wiki/{node_token}"

paths:
  output_dir: "<git-repository>/docs/feishu-knowledge"
  # Use the exact knowledge-base name, not a generic duplicate directory.
  generated_dir: "10_knowledge-base"

sync:
  mode: mirror
  prune: false
  include_non_docx: true
  keep_remote_assets: true
  workers: 4
  retry_workers: 1
  structure_workers: 2
  metadata_workers: 2
  incremental: true
  # Without an event target, compare wiki +node-get obj_edit_time/updated_at
  # before fetching document bodies. Set false only when an external event
  # pipeline always supplies --event-file/--changed-*-token.
  probe_remote_metadata: true
  # Optional: download remote Feishu image URLs into the local mirror and
  # rewrite Markdown links to 10_knowledge-base/_assets/. Keep false in the public
  # example; enable it in the private config after granting media/download
  # permissions or when the signed image URL is directly readable.
  download_assets: false
  # Sheet cells are sensitive data. Keep this disabled unless the user has
  # explicitly authorised a bounded range to be mirrored into Markdown.
  sheets:
    enabled: false
    # Set true only after approving bounded Markdown snapshots for every
    # standalone Wiki Sheet node. The synchronizer discovers grid tabs through
    # workbook-info; explicit selections below remain supported as overrides.
    all_nodes: false
    max_rows: 200
    max_columns: 50
    max_sheets_per_workbook: 500
    # Mixed workbooks can contain Base tabs. Keep this false unless those
    # records are also approved for bounded local mirroring.
    include_bitable_tabs: false
    max_bitable_records: 1000
    download_bitable_attachments: false
    # Maximum cells across one configured A1 range; hard-capped at 100000.
    max_cells: 10000
    # Continue by row when a response reaches this character limit; stop only
    # if the provider cannot report forward progress.
    max_chars: 100000
    skip_hidden: false
    # Each item must name one Wiki Sheet node, its stable sheet_id obtained
    # from `lark-cli sheets +workbook-info`, and a bounded A1 range.
    selections: []
    # - node_token: "<wiki-sheet-node-token>"
    #   sheet_id: "<sheet-id>"
    #   range: "A1:F200"
    # Preserve formula/style/comment/layout/chart metadata in a JSON snapshot
    # next to the Markdown mirror. This is bounded by each selected range.
    preserve:
      enabled: false
      formulas: true
      styles: true
      comments: true
      layout: true
      charts: true
      floating_images: true
      # Report metadata stays opt-in: it is retained in the Sheet JSON snapshot,
      # not reconstructed as interactive Markdown.
      pivots: false
      filters: false
      conditional_formats: false
      sparklines: false
    # Complete workbooks preserve formulas, styles, comments, charts, pivots
    # and cell images more faithfully than Markdown. This is a full sensitive
    # data export and therefore needs BOTH flags plus an explicit user approval.
    workbook_exports:
      enabled: false
      all_nodes: false
      batch_size: 10
      timeout_seconds: 120
      output_dir: "_exports/sheets"
  # Markdown may expose only a <sheet> reference, never its cell values. If this
  # remains disabled, the synchronizer preserves an unresolved marker and
  # validation reports the mirror as incomplete instead of silently dropping
  # the block. After approving the document scope, enable XML discovery and a
  # bounded top-left snapshot from each referenced grid worksheet.
  embedded_sheets:
    enabled: false
    # Set all_docx true only after approving every readable Docx/Wiki page.
    # Otherwise list the exact Wiki document node tokens below.
    all_docx: false
    node_tokens: []
    # At most this many embedded Sheet blocks are read from one document.
    max_sheets_per_document: 100
    # Together these bounds must not exceed max_cells (hard cap: 100000).
    max_rows: 200
    max_columns: 50
    max_cells: 10000
    # Fail instead of writing a partial table when the provider truncates.
    max_chars: 100000
    skip_hidden: false
    # Optional fidelity metadata for each bounded embedded Sheet range.
    preserve:
      enabled: false
      formulas: true
      styles: true
      comments: true
      layout: true
      charts: true
      floating_images: true
      pivots: false
      filters: false
      conditional_formats: false
      sparklines: false
  # Base/bitable data is also sensitive. Select individual tables and a
  # record limit; Markdown is accompanied by a schema-and-record JSON snapshot.
  bitables:
    enabled: false
    max_records: 1000
    # Attachments are separate local downloads. Keep this false unless their
    # selected tables and destination are explicitly approved.
    download_attachments: false
    selections: []
    # - node_token: "<wiki-bitable-node-token>"
    #   table_id: "<table-id>"
    #   max_records: 200
    #   include_views: false
    #   include_dashboards: false
    #   download_attachments: false
    # Complete Base exports preserve tables, views and dashboards in their
    # native .base form. This is an explicit full-export authorization.
    base_exports:
      enabled: false
      all_nodes: false
      batch_size: 5
      timeout_seconds: 120
      output_dir: "_exports/bitables"
  # Wiki `file` nodes are opaque binary downloads. Their types may include
  # zip/dmg/exe; the synchronizer only saves them and never opens, executes,
  # mounts, unzips, or parses them.
  files:
    downloads:
      enabled: false
      all_nodes: false
      batch_size: 10
      timeout_seconds: 120
      output_dir: "_assets/wiki-files"
  # Keep existing Feishu links by default. Enable only when the local mirror
  # should be self-contained and document references should point to local files.
  localize_internal_links: false
  # Convert exported <sub-page-list> blocks into Markdown navigation. This is
  # separate from the VitePress sidebar and remains off for compatibility.
  render_sub_page_navigation: false
  # Refresh documents with expired signed image URLs before downloading.
  refresh_asset_urls: true
  asset_refresh_workers: 4
  asset_dir: "_assets"
  asset_workers: 4
  asset_timeout_seconds: 30
  # Retry a token-backed media download after a transient or unclassified CLI
  # failure. Permission-denied and not-found responses stop immediately.
  asset_download_attempts: 3
  # Set a positive value for large mirrors to process only that many missing
  # resources per run. Already-downloaded assets are still rewritten locally;
  # repeat until --validate-only reports no unresolved assets. 0 means no limit.
  asset_batch_size: 0
  # A refreshed document may contain several newly signed URLs. Use this limit
  # to complete that document's local links in the same bounded retry step.
  # 0 means no limit.
  asset_refreshed_batch_size: 0
  # Default 50 MiB per file. Lower this for storage-constrained mirrors.
  # Larger attachments remain explicit local downloads and are reported as
  # asset_too_large instead of being silently represented as local files.
  max_asset_bytes: 52428800
  # Create a private per-run Markdown change ledger and bounded content diffs
  # under 90_同步元数据/. This never changes generated documents or deletes history.
  change_ledger: false
  change_ledger_dir: "change-reports"
  change_ledger_max_diff_lines: 400
  request_delay_seconds: 0.2
  # Global minimum interval between lark-cli request starts. This is shared
  # across all workers and prevents a large space from triggering 99991400.
  min_request_interval_seconds: 0.5
  metadata_request_delay_seconds: 0.2
  event_file: "<optional-event-ndjson-path>"

vitepress:
  sidebar_file: "90_同步元数据/sidebar.json"
