version: 1

default:
  direction: "Feishu -> local, read-only"
  local_data_write: "requires private-config opt-in and explicit source scope"
  git_publish: "never automatic"

resources:
  document:
    lists:
      status: supported
      route: "docs +fetch Markdown normalization"
      local_form: "Markdown ordered/unordered lists"
    tables:
      status: supported
      route: "docs +fetch Markdown/HTML table normalization"
      local_form: "portable Markdown or retained HTML table"
    images_and_attachments:
      status: supported_when_opted_in
      route: "docs +media-download or authenticated remote media download"
      config: "sync.download_assets: true"
      local_form: "deduplicated files in the generated mirror asset directory and rewritten relative links"
      limits: "sync.max_asset_bytes defaults to 50 MiB per resource; larger files remain remote and report asset_too_large until the customer explicitly raises the private limit."
      large_mirror_control: "A positive sync.asset_batch_size downloads only that many missing resources per run; existing local resources are still rewritten and manifest.stats.assets_deferred reports the remaining queue."
      retry_policy: "Token-backed media retries bounded transient or unclassified CLI failures; confirmed permission-denied and not-found responses remain actionable failures."

  sheet:
    display_table:
      status: supported_when_selected
      route: "sheets +workbook-info, sheets +csv-get"
      config: "sync.sheets.enabled with node_token + sheet_id + bounded A1 range"
      local_form: "Markdown table"
    fidelity_snapshot:
      status: supported_when_opted_in
      route:
        - "sheets +cells-get include value,formula,style,comment"
        - "sheets +sheet-info for layout"
        - "sheets +chart-list"
        - "sheets +float-image-list"
      config: "sync.sheets.preserve.enabled: true"
      local_form: "JSON snapshot beside the Markdown mirror"
    limitations:
      - "Chart and floating-image metadata are captured per selected worksheet; they are not rendered as native Markdown charts."
      - "Formula results are captured but not recalculated locally."
      - "Cell-image binary download, pivot-table recreation, and a native workbook file remain separate confirmed export work."
    complete_workbook:
      status: supported_after_full_export_confirmation
      route: "sheets +workbook-export --file-extension xlsx"
      config: "sync.sheets.workbook_exports.enabled=true and all_nodes=true"
      local_form: "batched .xlsx fidelity files linked from generated Sheet indexes"
      preserves: [formulas, styles, comments, charts, pivot_tables, cell_images]

  bitable:
    table_snapshot:
      status: supported_when_selected
      route:
        - "base +field-list"
        - "base +record-list"
        - "base +view-list when configured"
      config: "sync.bitables.enabled with node_token + table_id + max_records"
      local_form: "Markdown table plus schema-and-record JSON snapshot"
    attachments:
      status: supported_when_opted_in
      route: "base +record-download-attachment"
      config: "sync.bitables.download_attachments: true, optionally overridden per selection"
      local_form: "local files with relative paths recorded in the private table snapshot"
      limits: "sync.max_asset_bytes applies to every downloaded attachment"
    dashboard_reports:
      status: supported_when_selected
      route: "base +dashboard-list and base +dashboard-block-list"
      config: "sync.bitables.selections[].include_dashboards=true"
      local_form: "dashboard and block metadata in the Base JSON snapshot"
    complete_base:
      status: supported_after_full_export_confirmation
      route: "drive +export --doc-type bitable --file-extension base"
      config: "sync.bitables.base_exports.enabled=true and all_nodes=true"
      local_form: "batched .base fidelity files linked from generated Base indexes"

  wiki_file:
    opaque_binary:
      status: supported_after_explicit_full_download_confirmation
      route: "drive +download"
      config: "sync.files.downloads.enabled=true and all_nodes=true"
      local_form: "local binary copy linked from the generated file index"
      safety: "download only; never execute, mount, unpack, or parse ZIP/DMG/EXE and other opaque formats"

safety:
  required_before_local_data_write:
    - "approved source nodes/tables/ranges and private configuration"
    - "record limits for Base and bounded A1 ranges for Sheet"
    - "explicit attachment download opt-in when binaries are needed"
  isolated_pilot: "--pilot-node-token writes only the selected node(s) to the configured pilot output directory after verifying they exist in the current Wiki tree"
  never_automatic:
    - "whole-workbook or whole-Base export without sync.sheets.workbook_exports or sync.bitables.base_exports explicit approval"
    - "automatic Git commit or push"
    - "Feishu write-back"
