version: 1

modes:
  mirror:
    default: true
    source_of_truth: feishu
    local_generated_dir: 10_knowledge-base
    local_manual_dir: 20_本地补录
    remote_writes: never_by_default
    delete_local_files: false
  local:
    source_of_truth: local
    local_generated_dir: null
    local_manual_dir: 20_本地补录
    remote_writes: never
  managed:
    source_of_truth: explicit_per_document
    local_generated_dir: 10_knowledge-base
    local_manual_dir: 20_本地补录
    remote_writes: explicit_confirmation_only
    conflict_policy: stop_and_report

state:
  stable_key: node_token
  object_key: obj_token
  content_revision: docs.fetch.data.document.revision_id
  remote_change_marker:
    preferred: wiki.node_get.data.obj_edit_time
    fallback: wiki.node_get.data.updated_at
  manifest: 90_同步元数据/manifest.json
  state_file: 90_同步元数据/sync-state.json
  preserve_deleted_files_when_prune_false: true

subtree_exclusions:
  default: disabled
  opt_in_config: sync.exclude_subtrees.enabled
  roots: "stable node_token preferred; exact_title supported"
  behavior:
    - "discover the configured root in its parent listing but do not enumerate children"
    - "exclude the root and every known descendant from content reads, retries, resource downloads, active manifest and sidebar"
    - "record known historical members under manifest.excluded_nodes, never as remotely deleted"
  existing_generated_content:
    policy: "preserve unless the user explicitly runs --rebuild-tree"
    validation: "report excluded files/directories that remain locally"
  local_manual_dir: never_touched

sheets:
  default: metadata_stub
  opt_in_config: sync.sheets.enabled
  selection_contract: "node_token + sheet_id + bounded A1 range"
  read_flow:
    - "sheets +workbook-info validates selected sheet_id and resource_type"
    - "sheets +csv-get reads only the configured range"
    - "has_more=true is a failure; do not write a partial table"
  rendering: "display values only, Markdown table"
  no_file_export: true
  no_auto_download: true

change_ledger:
  default: disabled
  opt_in_config: sync.change_ledger
  location: "90_同步元数据/<change_ledger_dir>/<date>/<run>/summary.md"
  categories:
    - added
    - modified
    - moved
    - deleted_remotely
  modified_detail: "bounded unified diff only; never duplicate complete document bodies"
  mirror_effect: "does not overwrite generated content, local additions, or deletion policy"

validation:
  post_sync_gate: true
  standalone_flag: --validate-only
  checks:
    - manifest_and_state_are_readable
    - generated_files_exist_for_manifest_records
    - frontmatter_node_token_and_status_match_manifest
    - successful_documents_contain_no_error_placeholder
    - excluded_subtrees_are_absent_from_active_manifest_sidebar_and_generated_tree
    - generated_sidebar_covers_manifest_nodes
    - unresolved_assets_are_reported_when_local_assets_are_required
  failed_statuses:
    - failed
    - stale
  exit_code_on_failure: 2

concurrency:
  one_sync_per_output: true
  lock_scope: output_dir
  second_process_policy: stop_and_report

incremental:
  first_run: full_content_baseline
  subsequent_runs:
    - reconcile_tree_by_parent_node_token
    - use_event_targets_when_available
    - otherwise_probe_wiki_node_metadata
    - fetch_only_new_failed_or_changed_document_nodes
    - reuse_existing_markdown_for_unchanged_node_token
  force_full_content_flag: --full-content
  changed_node_flags:
    - --changed-node-token
    - --changed-obj-token
    - --event-file

tree:
  source_of_truth: "Feishu node parent_node_token"
  sibling_order_source: "Feishu wiki +node-list response order"
  sibling_order_policy: "preserve_remote_order; never sort by title"
  max_local_path_component_length: 48
  long_title_policy: "保留 full title in frontmatter/sidebar text; truncate local component and append node_token prefix"
  leaf_node: "<parent-dir>/<node-title>.md"
  node_with_children: "<parent-dir>/<node-title>/<node-title>.md"
  child_of_node_with_children: "<parent-dir>/<node-title>/<child-title>..."
  forbid_same_level_file_and_folder_with_same_name: true
  collision_suffix: "--node--<node_token_prefix> or --leaf--<node_token_prefix>"
  refresh_tree_only_flag: "--rebuild-tree --refresh-tree-only"
