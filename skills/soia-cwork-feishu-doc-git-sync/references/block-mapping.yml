version: 1

source:
  api: "lark-cli docs +fetch"
  preferred_format: markdown
  supported_object_types:
    - docx
    - doc

document_blocks:
  ordered_and_unordered_lists:
    rendering: "preserve portable Markdown list syntax and allowed ul/ol/li HTML when present"
  tables:
    rendering: "preserve Markdown tables and allowed table HTML; do not flatten rows into plain text"
  embedded_sheets:
    rendering: "never strip a <sheet> reference silently; keep an unresolved marker until an authorised bounded Sheet snapshot replaces it"
    validation: "unresolved embedded Sheet markers fail mirror validation; all_docx mode also rejects historical Docx files without a completed XML scan marker"

sheet_mirror:
  api:
    - "lark-cli sheets +workbook-info"
    - "lark-cli sheets +csv-get"
  opt_in: "sync.sheets.enabled=true with explicit sync.sheets.selections"
  rendering: "bounded CSV display values become Markdown tables"
  preservation_snapshot:
    opt_in: "sync.sheets.preserve.enabled=true"
    api:
      - "lark-cli sheets +cells-get --include value,formula,style,comment"
      - "lark-cli sheets +sheet-info"
      - "lark-cli sheets +chart-list"
      - "lark-cli sheets +float-image-list"
    output: "private JSON snapshot beside the generated Markdown"
  unsupported_as_native_markdown:
    - chart_rendering
    - formula_recalculation
    - pivot_table_recreation
    - cell_image_binary_download

bitable_mirror:
  opt_in: "sync.bitables.enabled=true with explicit node_token and table_id"
  api:
    - "lark-cli base +field-list"
    - "lark-cli base +record-list"
    - "lark-cli base +view-list when configured"
  output: "bounded Markdown table plus private schema-and-record JSON snapshot"
  attachment_download: "sync.bitables.download_attachments=true uses base +record-download-attachment"

normalization:
  remove_title_tag: true
  remove_dynamic_tags:
    - "<wiki_recent_update></wiki_recent_update>"
  preserve_tables: true
  preserve_remote_images: true
  download_images: opt_in
  local_asset_dir: "10_knowledge-base/_assets"
  media_token_strategy: "docs +media-download --as bot --token <file_token>, with bounded retries for transient or unclassified CLI failures"
  asset_deduplication: "prefer stable Feishu media token; fall back to source URL"
  attachment_rendering: "preserve a remote link by default; after an explicitly enabled download, replace Feishu HTML cards with portable Markdown links to the relative local file and unwrap a paragraph containing only that link"
  unresolved_image_behavior: keep_original_url_and_report
  unresolved_image_logging: counts_only_no_auth_urls

cite:
  document_id_strategy: "resolve doc-id by node_token first, then obj_token"
  document_rendering: "Feishu source URL by default; relative local Markdown link when sync.localize_internal_links is enabled"
  user_rendering: "@user-name, fallback to @user-id"
  missing_target_behavior: "plain visible title, never inline code"

sub_page_navigation:
  source: "<sub-page-list><sub-page doc-id|wiki-token|node-token .../></sub-page-list>"
  default: remove_export_only_markup
  opt_in: "sync.render_sub_page_navigation=true"
  rendering: "Markdown list using the same local-or-remote document target policy as citations"

unsupported:
  behavior: create_metadata_stub
  examples:
    - bitable
    - mindnote
    - file
  special_routes:
    bitable: "未配置时只生成元数据 stub；工作簿/xlsx/csv/base 文件导出必须遵循 references/export-policy.yml"
