version: 1

source:
  api: "lark-cli docs +fetch"
  preferred_format: markdown
  supported_object_types:
    - docx
    - doc

sheet_mirror:
  api:
    - "lark-cli sheets +workbook-info"
    - "lark-cli sheets +csv-get"
  opt_in: "sync.sheets.enabled=true with explicit sync.sheets.selections"
  rendering: "bounded CSV display values become Markdown tables"
  unsupported_in_markdown_mirror:
    - formulas
    - styles
    - comments
    - charts
    - pivot_tables
    - cell_images

normalization:
  remove_title_tag: true
  remove_dynamic_tags:
    - "<wiki_recent_update></wiki_recent_update>"
  preserve_tables: true
  preserve_remote_images: true
  download_images: opt_in
  local_asset_dir: "10_knowledge-base/_assets"
  media_token_strategy: "docs +media-download --as bot --token <file_token>"
  asset_deduplication: "prefer stable Feishu media token; fall back to source URL"
  attachment_rendering: "preserve a remote link by default; rewrite to a relative local path after an explicitly enabled download"
  unresolved_image_behavior: keep_original_url_and_report
  unresolved_image_logging: counts_only_no_auth_urls

cite:
  document_id_strategy: "resolve doc-id by node_token first, then obj_token"
  document_rendering: "Feishu source URL by default; relative local Markdown link when sync.localize_internal_links is enabled"
  user_rendering: "@user-name, fallback to @user-id"
  missing_target_behavior: "plain visible title, never inline code"

sub_page_navigation:
  source: "<sub-page-list><sub-page doc-id|wiki-token|node-token .../></sub-page-list>"
  default: remove_export_only_markup
  opt_in: "sync.render_sub_page_navigation=true"
  rendering: "Markdown list using the same local-or-remote document target policy as citations"

unsupported:
  behavior: create_metadata_stub
  examples:
    - bitable
    - mindnote
    - file
  special_routes:
    bitable: "只读盘点使用 drive +inspect；实际 xlsx/csv/base 导出必须遵循 references/export-policy.yml"
