version: 1

default:
  enabled: false
  fallback: metadata_stub

embedded_document_sheet:
  status: supported_when_opted_in
  discovery: "docs +fetch --doc-format xml, then extract <sheet token=... sheet-id=...>"
  markdown_fetch_limitation: "The normal Markdown payload may expose only a <sheet> reference and never includes cell values; XML remains the source of truth for the approved document scope."
  private_config:
    enabled: "sync.embedded_sheets.enabled=true"
    scope: "all_docx=true, or a non-empty node_tokens list"
    bounds: [max_sheets_per_document, max_rows, max_columns, max_cells, max_chars]
  rendering:
    placement: "When Markdown exposes a <sheet> marker, replace it with a pointer and append a clearly labelled '嵌入式表格' snapshot after the document body; XML-only references still use the appendix."
    format: markdown_table
    marker: "HTML comments distinguish a completed scan from each mirrored table and make incremental repair deterministic."
  failure_policy: "Never silently delete a <sheet> reference. Without an authorised snapshot, retain an incompleteness marker and fail mirror validation. In all_docx mode, every historical document must carry a completed XML scan marker before the mirror can pass. Missing worksheet metadata, non-grid resources, configured bound overflow, or a truncated response that makes no forward row progress fails the document for retry."

provider:
  identity: bot
  workbook_metadata: "lark-cli sheets +workbook-info"
  value_read: "lark-cli sheets +csv-get"
  preservation_read:
    - "lark-cli sheets +cells-get --include value,formula,style,comment"
    - "lark-cli sheets +sheet-info"
    - "lark-cli sheets +chart-list"
    - "lark-cli sheets +float-image-list"

selection:
  automatic_scope:
    opt_in: "sync.sheets.enabled=true and sync.sheets.all_nodes=true"
    discovery: "For every standalone Wiki sheet node, call workbook-info and select every grid worksheet."
    bounds: [max_sheets_per_workbook, max_rows, max_columns, max_cells, max_chars]
    response_pagination: "When csv-get returns has_more, continue from actual_range's next row until the bounded selection is complete."
    mixed_workbook_policy: "With include_bitable_tabs=true, route embedded Base tabs through bounded field-list/record-list reads; otherwise fail the node instead of silently skipping the tab."
  required_fields:
    - node_token
    - sheet_id
    - range
  range_format: "bounded A1 range, for example A1:F200"
  sheet_id_source: "workbook-info data.sheets[].sheet_id"
  max_cells_default: 10000
  max_cells_hard_limit: 100000
  max_chars_default: 100000
  partial_response_policy: "continue_by_actual_range_row; fail_without_writing if the provider makes no forward progress"

rendering:
  format: markdown_table
  value_semantics: formatted_display_values
  supported: [plain_cell_values]
  preservation_snapshot:
    opt_in: "sync.sheets.preserve.enabled=true"
    output: "_snapshots/<node-and-sheet>.sheet.json"
    supported: [formulas, styles, comments, layout_metadata, chart_metadata, floating_image_metadata, pivot_metadata, filter_metadata, conditional_format_metadata, sparkline_metadata]
  whole_workbook_export:
    opt_in: "sync.sheets.workbook_exports.enabled=true and all_nodes=true after explicit full-export approval"
    route: "sheets +workbook-export --file-extension xlsx"
    output: "generated mirror _exports/sheets/ as an offline fidelity artifact"
    preserves_as_native_file: [formulas, styles, comments, charts, pivot_tables, cell_images]
    async_recovery: "Persist a pending export ticket locally, poll it on later batches, then use drive +export-download when ready; do not create a duplicate export task."
  unsupported_as_native_markdown: [chart_rendering, formula_recalculation, pivot_tables, cell_image_binary_download, attachments]

safety:
  explicit_user_approval: required_before_local_mirror_write
  private_config_opt_in: sync.sheets.enabled
  all_standalone_nodes_opt_in: sync.sheets.all_nodes
  embedded_document_opt_in: sync.embedded_sheets.enabled with an explicit document scope
  no_file_export: "unless sync.sheets.workbook_exports explicitly records whole-workbook approval"
  no_media_download: true
  no_auto_git_commit_or_push: true
