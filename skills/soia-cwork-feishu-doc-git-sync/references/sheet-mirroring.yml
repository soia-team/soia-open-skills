version: 1

default:
  enabled: false
  fallback: metadata_stub

provider:
  identity: bot
  workbook_metadata: "lark-cli sheets +workbook-info"
  value_read: "lark-cli sheets +csv-get"
  preservation_read:
    - "lark-cli sheets +cells-get --include value,formula,style,comment"
    - "lark-cli sheets +sheet-info"
    - "lark-cli sheets +chart-list"
    - "lark-cli sheets +float-image-list"

selection:
  required_fields:
    - node_token
    - sheet_id
    - range
  range_format: "bounded A1 range, for example A1:F200"
  sheet_id_source: "workbook-info data.sheets[].sheet_id"
  max_cells_default: 10000
  max_cells_hard_limit: 100000
  max_chars_default: 100000
  partial_response_policy: fail_without_writing_partial_table

rendering:
  format: markdown_table
  value_semantics: formatted_display_values
  supported: [plain_cell_values]
  preservation_snapshot:
    opt_in: "sync.sheets.preserve.enabled=true"
    output: "_snapshots/<node-and-sheet>.sheet.json"
    supported: [formulas, styles, comments, layout_metadata, chart_metadata, floating_image_metadata, pivot_metadata, filter_metadata, conditional_format_metadata, sparkline_metadata]
  whole_workbook_export:
    opt_in: "sync.sheets.workbook_exports.enabled=true and all_nodes=true after explicit full-export approval"
    route: "sheets +workbook-export --file-extension xlsx"
    output: "generated mirror _exports/sheets/ as an offline fidelity artifact"
    preserves_as_native_file: [formulas, styles, comments, charts, pivot_tables, cell_images]
    async_recovery: "Persist a pending export ticket locally, poll it on later batches, then use drive +export-download when ready; do not create a duplicate export task."
  unsupported_as_native_markdown: [chart_rendering, formula_recalculation, pivot_tables, cell_image_binary_download, attachments]

safety:
  explicit_user_approval: required_before_local_mirror_write
  private_config_opt_in: sync.sheets.enabled
  no_file_export: "unless sync.sheets.workbook_exports explicitly records whole-workbook approval"
  no_media_download: true
  no_auto_git_commit_or_push: true
