# soia-pkm-transform public config example.
# Copy to ~/.config/soia-pkm/transform.yml or point SOIA_PKM_TRANSFORM_CONFIG to it.
# Keep secrets out of this file. Store provider auth in each provider's private auth flow.

version: 1

vault:
  path_env: OBSIDIAN_VAULT
  update_source_note: true

outputs:
  root: "outputs/transform"
  date_partition: yearly
  naming: "{date}-{source}-{title}-{target}"
  default_content_mode:
    pdf: preserve
    ppt: learning
    image: visual_dense
    long_image: visual_dense
    infographic: visual_dense
    quiz: learning
    mindmap: synthesize
    podcast: synthesize
    flashcards: learning
    report: synthesize
  pdf:
    provider: obsidian
    save: sibling
  ppt:
    provider: auto
    format: pptx
    save: output_root
    params:
      slide_count: auto
      audience: auto
      style: auto
      aspect_ratio: "16:9"
      density: dense
      include_speaker_notes: auto
  image:
    provider: auto
    format: png
    save: output_root
    subtype_default: cover_image   # cover_image | illustration | long_image | infographic
    params:
      aspect_ratio: auto
      text_policy: avoid_dense_text
      style: auto
  long_image:
    provider: local_visual
    format: png
    save: output_root
    params:
      canvas: "1080x1920"
      density: high
      style: research_poster
  infographic:
    provider: local_visual
    format: png
    save: output_root
    params:
      canvas: "1080x1920"
      density: high
      style: research_poster
  quiz:
    provider: auto
    format: markdown
    save: output_root
  mindmap:
    provider: auto
    format: mermaid
    save: output_root
  podcast:
    provider: notebooklm
    format: mp3
    save: output_root
  flashcards:
    provider: notebooklm
    format: markdown
    save: output_root
  report:
    provider: auto
    format: markdown
    save: output_root

providers:
  notebooklm:
    enabled: auto
    install_policy: prompt   # prompt | auto_when_requested | never
    install_command: uv tool install "notebooklm-py[browser,cookies]"
    command: notebooklm
    home_env: NOTEBOOKLM_HOME
    home_default: "~/.config/soia-pkm/notebooklm"
    profile_env: NOTEBOOKLM_PROFILE
    profile_default: default
    auth_check: NOTEBOOKLM_HOME="${NOTEBOOKLM_HOME:-$HOME/.config/soia-pkm/notebooklm}" notebooklm auth check --test --json
    login_command: NOTEBOOKLM_HOME="${NOTEBOOKLM_HOME:-$HOME/.config/soia-pkm/notebooklm}" notebooklm login
    current_browser_cookie_login_policy: prefer_when_user_requests_current_chrome
    current_chrome_login_command: NOTEBOOKLM_HOME="${NOTEBOOKLM_HOME:-$HOME/.config/soia-pkm/notebooklm}" notebooklm login --browser-cookies 'chrome::<profile>'
    language: zh_Hans
    prefer_for:
      - podcast
      - video
      - quiz
      - flashcards
      - mindmap
      - report
      - infographic
  obsidian:
    enabled: auto
    prefer_for:
      - pdf
  open_design:
    enabled: optional
    install_policy: prompt   # prompt | auto_when_requested | never
    repo: https://github.com/nexu-io/open-design.git
    home_env: OPEN_DESIGN_HOME
    command: pnpm
    node_version: "24"
    quality_gate:
      render_required: true
      min_infographic_blocks: 8
      min_deck_slides: 8
      require_layout_variety: true
    prefer_for:
      - ppt
      - image
      - long_image
      - infographic
    templates:
      architecture: html-ppt-knowledge-arch-blueprint
      technical: html-ppt-tech-sharing
      course: html-ppt-course-module
      dense_infographic: magazine-poster
      ai_graph: html-ppt-graphify-dark-graph
  local_visual:
    enabled: true
    prefer_for:
      - ppt
      - long_image
      - infographic
    render:
      prefer: playwright
      fallback:
        - browser_screenshot
        - print_to_pdf
  imagegen:
    enabled: auto
    prefer_for:
      - image
      - cover_image
      - illustration
    text_policy: avoid_dense_text
    compose_text_later: true
  local:
    enabled: true
    prefer_for:
      - ppt
      - image
      - long_image
      - quiz
      - mindmap
      - report
  publish:
    enabled: auto
    prefer_for:
      - wechat
      - x_thread
      - xhs

validation:
  pdf:
    check_pages: true
    render_sample: true
  ppt:
    render_preview: true
    check_overlaps: true
  image:
    check_dimensions: true
  quiz:
    check_answer_count: true
  mindmap:
    check_syntax: true

prompt_routes:
  ppt:
    local: prompt-ppt.md
    local_visual: prompt-ppt.md
    notebooklm: prompt-notebooklm-ppt.md
    open_design: prompt-ppt.md
  image:
    codex_image: prompt-codex-image.md
    imagegen: prompt-codex-image.md
    local_visual: prompt-infographic.md
    notebooklm: prompt-notebooklm-image.md
    open_design: prompt-infographic.md
  long_image:
    local_visual: prompt-infographic.md
    notebooklm: prompt-notebooklm-image.md
    open_design: prompt-infographic.md
  infographic:
    local_visual: prompt-infographic.md
    notebooklm: prompt-notebooklm-image.md
    open_design: prompt-infographic.md
  quiz:
    notebooklm: prompt-notebooklm-quiz.md
  flashcards:
    notebooklm: prompt-notebooklm-flashcards.md
  mindmap:
    notebooklm: prompt-notebooklm-mindmap.md
  podcast:
    notebooklm: prompt-notebooklm-podcast.md
  report:
    local: prompt-report.md
    notebooklm: prompt-notebooklm-report.md
