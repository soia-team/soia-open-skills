# soia-pkm-transform public config example.
# Copy to ~/.config/soia-pkm/transform.yml or point SOIA_PKM_TRANSFORM_CONFIG to it.
# Keep secrets out of this file. Store provider auth in each provider's private auth flow.

version: 1

vault:
  path_env: OBSIDIAN_VAULT
  update_source_note: true

outputs:
  root: "outputs/transform"
  date_partition: yearly
  naming: "{date}-{source}-{title}-{target}"
  default_content_mode:
    pdf: preserve
    ppt: learning
    image: visual_dense
    long_image: visual_dense
    infographic: visual_dense
    quiz: learning
    mindmap: synthesize
    podcast: synthesize
    flashcards: learning
    report: synthesize
  pdf:
    provider: obsidian
    save: sibling
  ppt:
    provider: open_design
    format: pptx
    save: output_root
  image:
    provider: auto
    format: png
    save: output_root
  long_image:
    provider: open_design
    format: png
    save: output_root
  infographic:
    provider: open_design
    format: png
    save: output_root
  quiz:
    provider: auto
    format: markdown
    save: output_root
  mindmap:
    provider: auto
    format: mermaid
    save: output_root
  podcast:
    provider: notebooklm
    format: mp3
    save: output_root
  flashcards:
    provider: notebooklm
    format: markdown
    save: output_root
  report:
    provider: auto
    format: markdown
    save: output_root

providers:
  notebooklm:
    enabled: auto
    command: notebooklm
    profile_env: NOTEBOOKLM_PROFILE
    home_env: NOTEBOOKLM_HOME
    language: zh_Hans
    prefer_for:
      - podcast
      - video
      - quiz
      - flashcards
      - mindmap
      - report
      - infographic
  obsidian:
    enabled: auto
    prefer_for:
      - pdf
  open_design:
    enabled: auto
    command: pnpm
    node_version: "24"
    prefer_for:
      - ppt
      - image
      - long_image
      - infographic
    templates:
      architecture: html-ppt-knowledge-arch-blueprint
      technical: html-ppt-tech-sharing
      course: html-ppt-course-module
      dense_infographic: magazine-poster
      ai_graph: html-ppt-graphify-dark-graph
  local:
    enabled: true
    prefer_for:
      - ppt
      - image
      - long_image
      - quiz
      - mindmap
      - report
  publish:
    enabled: auto
    prefer_for:
      - wechat
      - x_thread
      - xhs

validation:
  pdf:
    check_pages: true
    render_sample: true
  ppt:
    render_preview: true
    check_overlaps: true
  image:
    check_dimensions: true
  quiz:
    check_answer_count: true
  mindmap:
    check_syntax: true
