# Copy to:
# ~/.config/soia-skills/soia-open-skills/cwork/soia-cwork-feishu-cli/config.yml
# Or set SOIA_CWORK_FEISHU_CONFIG_FILE to a custom path.
# Never commit a real App Secret or place it in a chat, vault, log, or shell history.

version: 1

defaults:
  profile: feishu-reader
  brand: feishu
  identity: bot
  read_only: true

env:
  LARK_APP_ID: "<YOUR_APP_ID>"
  LARK_APP_SECRET: "<YOUR_APP_SECRET>"
  LARK_PROFILE: "feishu-reader"
  LARK_BRAND: "feishu"

permissions:
  requested_domains:
    - docs
    - drive
    - wiki
  policy: read_only_first
