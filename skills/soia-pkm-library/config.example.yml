# soia-pkm-library private config example.
# Copy to ~/.config/soia-skills/soia-open-skills/soia-pkm/soia-pkm-library/config.yml.
# `WEREAD_API_KEY` is a bearer token for the WeRead Agent API Gateway.
# It is not derived from old cookies automatically. Request a real key from the
# team/person who operates https://i.weread.qq.com/api/agent/gateway, then fill
# it here.

env:
  OBSIDIAN_VAULT: "<vault-path>"
  WEREAD_API_KEY: "<YOUR_WEREAD_API_KEY>"
