# model-catalog.yml -- runtime single source of truth for executor/model pricing.
#
# Generated by hand from references/model-pricing-2026-07-10.md (itself a copy of
# an upstream pricing brief dated 2026-07-10). Parsed at runtime by
# scripts/catalog_lib.py (a restricted YAML-subset parser -- see that file's
# module docstring for exactly which YAML features are supported).
#
# Editing rules:
#   - 2-space indentation only, no tabs.
#   - One inline flow list per line at most, e.g. aliases: [a, b].
#   - No multi-line scalars; keep every value on one line.
#   - Unknown/unconfirmed facts MUST be null, not a guessed number.
#   - Re-run `python3 scripts/catalog_lib.py --selftest` after any edit.
#
# Known count discrepancy (reported, not silently corrected): the Phase 1 task
# brief that requested this file described the source as "OpenAI 10/Anthropic
# 11/Google 8-tier multi-row/DeepSeek 2". Direct enumeration of
# model-pricing-2026-07-10.md finds 7 distinct Google model families (not 8):
# gemini-3.5-flash, gemini-3.1-flash-lite, gemini-3.1-pro-preview,
# gemini-3-flash-preview, gemini-2.5-pro, gemini-2.5-flash, gemini-2.5-flash-lite.
# 10 OpenAI + 10 distinct Anthropic + 7 Google + 2 DeepSeek = 29 distinct real
# models, matching the source document's own "29 模型" header count exactly.
# Anthropic contributes 10 invocable model rows. Claude Sonnet 5's promotional
# and standard prices are modeled as date-effective tiers inside the same row;
# a price period must never masquerade as a second provider model_id.
