interface:
  display_name: "ProcessOn 图表助手"
  short_description: "可断点、可审计地递归盘点 ProcessOn，并安全导出图表。"
  default_prompt: "Use $soia-cwork-processon-diagrams to recursively inventory every ProcessOn child node in resumable batches, serialize and audit the discovered-minus-visited queue, then build and verify an artifact archive plan before exporting confirmed flowcharts as VSDX and mind maps as XMind; keep inventory completion separate from source-file archive completion and never claim completion before the applicable audit passes."
