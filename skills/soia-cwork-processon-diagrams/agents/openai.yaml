interface:
  display_name: "ProcessOn 图表助手"
  short_description: "可断点、可审计地递归盘点 ProcessOn，并安全导出图表。"
  default_prompt: "Use $soia-cwork-processon-diagrams in three explicit stages: (1) inventory.init for a recursive, resumable and audited baseline, or inventory.incremental only after a new complete snapshot is diffed against a previous complete checkpoint; (2) use the host-agnostic processon_browser_runner.py with its dedicated profile—never the customer's main Chrome or a host-only browser/computer-use loop—then build and verify the archive plan, initialize download-progress.json, use next/record/mark/audit for every confirmed artifact, serialize asynchronous exports, and require balanced popup open/close plus context-close receipts; flowcharts default to VSDX and mind maps to XMind, while Markdown-only mind-map export is evidence rather than completion; (3) ask before parsing, converting or upgrading and route VSDX work to soia-dev-drawio-visio-diagrams. Keep each stage's evidence and completion state separate; a snapshot diff is not a ProcessOn API/event delta."
