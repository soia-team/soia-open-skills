# soia-dev-ai-cli-upgrade private config example.
# Copy to ~/.config/soia-skills/soia-open-skills/soia-dev/soia-dev-ai-cli-upgrade/config.yml.

env:
  DRY_RUN: "1"
  # Add gemini only for confirmed Standard/Enterprise, API Key, or Vertex AI use.
  TOOLS: "codex,claude,agy"
  NPM_PREFIX: "$HOME/.npm-global"
  AGY_INSTALL: "0"
  AGY_INSTALL_DIR: "$HOME/.local/bin"
  LOG_DIR: "$HOME/.local/state/soia-dev-ai-cli-upgrade/logs"
  CURSOR_UPGRADE_CMD: "<optional command>"
